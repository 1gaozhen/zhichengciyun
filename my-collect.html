<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的收藏 - 智承瓷韵</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft Yahei",sans-serif;}
        body{background:#f9f3eb;padding:20px;}
        .head{background:#965a20;color:white;padding:20px;border-radius:12px;margin-bottom:20px;}
        .back{background:#fff;color:#965a20;border:none;padding:8px 15px;border-radius:8px;cursor:pointer;}
        .item{background:#fff;border-radius:10px;padding:12px;display:flex;align-items:center;margin-bottom:10px;}
        .item img{width:80px;height:80px;object-fit:cover;border-radius:8px;}
        .info{margin-left:12px;flex:1;}
        .name{font-weight:bold;margin-bottom:5px;}
        .time{font-size:12px;color:#888;}
        .empty{text-align:center;color:#999;padding:60px 0;}
    </style>
</head>
<body>
<div class="head">
    <button class="back" onclick="location.href='user.html'">← 返回个人中心</button>
    <h2>⭐ 我的收藏</h2>
</div>
<div id="list"></div>

<script src="main.js"></script>
<script>
const user = localStorage.getItem("loginUser");
if(!user){
    alert("请先登录");
    location.href="index.html";
}

// 读取你现在真实的收藏ID
const starIds = JSON.parse(localStorage.getItem("FORUM_STARS")) || [];
const box = document.getElementById("list");

if(starIds.length === 0){
    box.innerHTML = `<div class="empty">暂无收藏</div>`;
}else{
    let html = "";
    starIds.forEach(pid=>{
        let idx = parseInt(pid.replace("PAT_",""));
        let item = patternData[idx];
        if(item){
            html += `
            <div class="item">
                <img src="${item.mainImg}">
                <div class="info">
                    <div class="name">${item.name}</div>
                    <div class="time">纹样收藏</div>
                </div>
            </div>
            `;
        }
    })
    box.innerHTML = html;
}
</script>
</body>
</html>
