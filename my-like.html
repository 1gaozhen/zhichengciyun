<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的点赞记录</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:Microsoft Yahei;}
        body{background:#f9f3eb;padding:20px;}
        .header{background:#965a20;color:white;padding:20px;border-radius:12px;margin-bottom:20px;}
        .back{background:white;color:#965a20;border:none;padding:8px 14px;border-radius:6px;cursor:pointer;}
        .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:15px;margin-top:20px;}
        .card{background:white;border-radius:10px;overflow:hidden;cursor:pointer;}
        .card img{width:100%;height:160px;object-fit:cover;}
        .info{padding:10px;}
        .empty{text-align:center;color:#999;padding:60px 0;}
    </style>
</head>
<body>
<div class="header">
    <button class="back" onclick="location.href='user.html'">← 返回个人中心</button>
    <h2>❤️ 我的点赞记录</h2>
</div>
<div class="grid" id="list"></div>
<div class="empty" id="empty">暂无点赞记录</div>
<script src="main.js"></script>
<script>
const user=localStorage.getItem("loginUser");
if(!user){alert("请先登录");location.href="index.html";}
const ids=JSON.parse(localStorage.getItem(`USER_LIKE_${user}`))||[];
const list=document.getElementById("list");
const empty=document.getElementById("empty");
if(ids.length===0){empty.style.display="block";list.style.display="none";}
else{
    empty.style.display="none";list.style.display="grid";let html="";
    ids.forEach(pid=>{const idx=parseInt(pid.replace("PAT_",""));const item=patternData[idx];if(item)html+=`<div class="card" onclick="location.href='detail.html?id=${idx}'"><img src="${item.mainImg}"><div class="info">${item.name}</div></div>`;});
    list.innerHTML=html;
}
</script>
</body>
</html>
