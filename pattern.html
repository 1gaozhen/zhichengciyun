<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>纹样宝库</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft Yahei";}
        body{background:#f9f3eb;}

        .header{
            background:#965a20;color:white;padding:18px 20px;
            display:flex;justify-content:space-between;align-items:center;
        }
        .header a{color:white;text-decoration:none;}

        .top-search-bar{
            max-width:1400px;margin:25px auto;padding:0 20px;
        }
        .main-search{
            width:100%;padding:14px 18px;border:1px solid #ddd;border-radius:30px;font-size:16px;
        }

        .main-tab-wrap{
            max-width:1400px;margin:15px auto;padding:0 20px;display:flex;gap:15px;
        }
        .main-tab{
            padding:10px 22px;border-radius:25px;border:none;background:#fff;cursor:pointer;font-size:15px;
        }
        .main-tab.active{background:#965a20;color:white;}

        .filter-row{
            max-width:1400px;margin:15px auto;padding:0 20px;display:flex;gap:20px;
        }
        .filter-select{
            padding:10px 16px;border:1px solid #ddd;border-radius:8px;background:white;min-width:150px;
        }

        .pattern-container{max-width:1400px;margin:30px auto 50px;padding:0 20px;}
        .pattern-grid{
            display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:20px;
        }
        .pattern-card{
            background:white;border-radius:10px;overflow:hidden;transition:0.3s;cursor:pointer;
            position: relative;
        }
        .pattern-card:hover{transform:translateY(-6px);box-shadow:0 6px 16px rgba(0,0,0,0.12);}
        .card-img{width:100%;height:180px;object-fit:cover;background:#fff;}
        .card-info{padding:12px;}
        .card-name{font-weight:bold;font-size:15px;margin-bottom:6px;}
        .card-dynasty{font-size:13px;color:#965a20;margin-bottom:8px;}
        .card-stat{font-size:13px;color:#777;display:flex;justify-content:space-between;}

        .star-btn{
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(0,0,0,0.4);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 4px 8px;
            font-size: 12px;
            cursor: pointer;
            z-index: 2;
        }
        .star-btn.active{
            background: #ff9800;
            color: white;
        }
        .pattern-like-btn {
            cursor: pointer;
            transition: all 0.2s;
        }
        .pattern-like-btn.liked {
            color: #ff4444;
            font-weight: bold;
        }

        .empty-tip{width:100%;text-align:center;padding:80px 0;color:#999;font-size:16px;}

        @media (max-width:768px){
            .main-tab-wrap{gap:8px;overflow-x:auto;padding-bottom:10px;}
            .filter-row{flex-wrap:wrap;}
        }
    </style>
</head>
<body>

<div class="header">
    <h2>纹样宝库 · 全部纹样展示</h2>
    <a href="index.html">返回首页</a>
</div>

<div class="top-search-bar">
    <input type="text" class="main-search" id="globalSearch" placeholder="搜索纹样名称、朝代或特征...">
</div>

<div class="main-tab-wrap">
    <button class="main-tab active" data-cate="all">全部</button>
    <button class="main-tab" data-cate="青花">青花瓷</button>
    <button class="main-tab" data-cate="唐三彩">唐三彩</button>
    <button class="main-tab" data-cate="汝窑">汝窑</button>
    <button class="main-tab" data-cate="官窑">官窑</button>
</div>

<div class="filter-row">
    <select class="filter-select" id="dynastyFilter">
        <option value="all">全部朝代</option>
        <option value="明代">明代</option>
        <option value="清代">清代</option>
        <option value="明清通用">明清通用</option>
    </select>
    <select class="filter-select" id="colorFilter">
        <option value="all">全部颜色</option>
        <option value="蓝色">蓝白青花</option>
    </select>
</div>

<div class="pattern-container">
    <div class="pattern-grid" id="patternAllList"></div>
</div>

<script>
// ==========================
// 17个完整纹样数据
// ==========================
const patternData = [
    { name:"青花菊花纹", mainImg:"images/pattern_01_chrysanthemum.jpg", dynasty:"明代", type:"花卉纹样", desc:"高洁清雅、长寿安康。" },
    { name:"青花繁复缠枝花纹", mainImg:"images/pattern_02_complex.jpg", dynasty:"清代", type:"花卉纹样", desc:"层次丰富、生机盎然。" },
    { name:"青花龙纹纹样", mainImg:"images/pattern_03_dragon.jpg", dynasty:"明清通用", type:"瑞兽纹样", desc:"龙腾四海、运势昌盛。" },
    { name:"青花缠枝大花纹", mainImg:"images/pattern_04_flower.jpg", dynasty:"明代", type:"花卉纹样", desc:"花开繁盛、生生不息。" },
    { name:"青花福禄平安多子纹", mainImg:"images/pattern_05_fu.jpg", dynasty:"清代", type:"吉祥纹样", desc:"承载平安兴旺祈愿。" },
    { name:"青花葡萄纹", mainImg:"images/pattern_06_grape.jpg", dynasty:"明代", type:"果蔬纹样", desc:"多子多福、家业兴旺。" },
    { name:"青花缠枝牡丹纹", mainImg:"images/pattern_07_peony.jpg", dynasty:"明代", type:"花卉纹样", desc:"牡丹象征花开富贵、圆满昌盛。" },
    { name:"青花凤凰纹样", mainImg:"images/pattern_08_phoenix.jpg", dynasty:"明清通用", type:"瑞兽纹样", desc:"凤凰高贵吉祥。" },
    { name:"青花折枝小花纹", mainImg:"images/pattern_09_smallflower.jpg", dynasty:"明代", type:"花卉纹样", desc:"清雅秀气，东方审美。" },
    { name:"青花缠枝团花纹样", mainImg:"images/pattern_10_tuanhua.jpg", dynasty:"清代", type:"花卉纹样", desc:"圆形对称团花构图，寓意团圆美满。" },
    { name:"青花富贵平安纹", mainImg:"images/pattern_11_fupeace.jpg", dynasty:"清代", type:"吉祥纹样", desc:"富贵平安，万事如意。" },
    { name:"青花祥龙纳福纹", mainImg:"images/pattern_12_dragonluck.jpg", dynasty:"清代", type:"瑞兽纹样", desc:"祥龙纳福，驱邪避灾。" },
    { name:"青花吉语文字纹", mainImg:"images/pattern_13_character.jpg", dynasty:"清代", type:"文字纹样", desc:"吉语文字，吉祥祈福。" },
    { name:"青花瑞兽纹样", mainImg:"images/pattern_14_beast.jpg", dynasty:"明代", type:"瑞兽纹样", desc:"瑞兽护佑，家宅平安。" },
    { name:"青花寿桃吉祥纹", mainImg:"images/pattern_15_shouluck.jpg", dynasty:"清代", type:"吉祥纹样", desc:"寿桃寓意健康长寿。" },
    { name:"青花婴戏多子纹", mainImg:"images/pattern_16_childluck.jpg", dynasty:"明代", type:"吉祥纹样", desc:"婴戏多子，家族兴旺。" },
    { name:"青花团花纹样", mainImg:"images/pattern_17_circle.jpg", dynasty:"明代", type:"花卉纹样", desc:"团花对称，团圆美满。" }
];

// ==========================
// 统计数据
// ==========================
function getPatternStats(idx) {
    return {
        like: parseInt(localStorage.getItem("like_" + idx)) || 0,
        view: parseInt(localStorage.getItem("view_" + idx)) || 0,
        comment: JSON.parse(localStorage.getItem("comment_" + idx)) || []
    };
}

// ==========================
// 收藏功能
// ==========================
const STAR_KEY = "FORUM_STARS";
function getStars() { return JSON.parse(localStorage.getItem(STAR_KEY)) || []; }
function saveStars(list) { localStorage.setItem(STAR_KEY, JSON.stringify(list)); }

function toggleStar(pid) {
    let stars = getStars();
    if (stars.includes(pid)) {
        stars = stars.filter(s => s !== pid);
        saveStars(stars);
        renderPattern();
        return;
    }

    stars.push(pid);
    saveStars(stars);
    const user = localStorage.getItem("loginUser");
    if (!user) { alert("请先登录"); return; }

    const realId = parseInt(pid.replace("PAT_", ""));
    const item = patternData[realId];
    if (!item) return;

    let myCollect = JSON.parse(localStorage.getItem(`collect_${user}`)) || [];
    if (!myCollect.find(i => i.pid == pid)) {
        myCollect.unshift({
            pid: pid, name: item.name, img: item.mainImg, collectTime: new Date().toLocaleString()
        });
        localStorage.setItem(`collect_${user}`, JSON.stringify(myCollect));
    }
    renderPattern();
}

// ==========================
// 点赞功能（三端同步）
// ==========================
function toggleLike(pid, el) {
    const user = localStorage.getItem("loginUser");
    if (!user) { alert("请先登录！"); return; }

    let realId = parseInt(pid.replace("PAT_", ""));
    let likeList = JSON.parse(localStorage.getItem(`USER_LIKE_${user}`)) || [];
    let currentLike = parseInt(localStorage.getItem(`like_${realId}`)) || 0;

    if (likeList.includes(pid)) {
        likeList = likeList.filter(id => id !== pid);
        currentLike = Math.max(0, currentLike - 1);
        el.classList.remove("liked");
    } else {
        likeList.push(pid);
        currentLike++;
        el.classList.add("liked");
    }

    localStorage.setItem(`USER_LIKE_${user}`, JSON.stringify(likeList));
    localStorage.setItem(`like_${realId}`, currentLike);
    el.innerText = `❤️${currentLike}`;
}

// ==========================
// 筛选渲染
// ==========================
let nowCate = 'all';
let nowDynasty = 'all';
let searchVal = '';

function renderPattern() {
    const box = document.getElementById('patternAllList');
    const loginUser = localStorage.getItem("loginUser");
    const userLikeList = loginUser ? JSON.parse(localStorage.getItem(`USER_LIKE_${loginUser}`)) || [] : [];
    const stars = getStars();

    let result = patternData.filter((item, idx) => {
        let cateOk = nowCate === 'all' || item.name.includes(nowCate);
        let dynastyOk = nowDynasty === 'all' || item.dynasty === nowDynasty;
        let searchOk = item.name.includes(searchVal) || item.desc.includes(searchVal);
        return cateOk && dynastyOk && searchOk;
    });

    if (result.length === 0) {
        box.innerHTML = `<div class="empty-tip">暂无符合筛选条件的纹样</div>`;
        return;
    }

    let html = '';
    result.forEach((item) => {
        let originalIndex = patternData.indexOf(item);
        let pid = "PAT_" + originalIndex;
        let stats = getPatternStats(originalIndex);
        let isStar = stars.includes(pid);
        let isLiked = userLikeList.includes(pid);

        html += `
        <div class="pattern-card" onclick="location.href='detail.html?id=${originalIndex}'">
            <button class="star-btn ${isStar ? 'active' : ''}" 
                onclick="event.stopPropagation(); toggleStar('${pid}')">
                ${isStar ? '⭐ 已收藏' : '☆ 收藏'}
            </button>

            <img src="${item.mainImg}" class="card-img" alt="${item.name}">
            <div class="card-info">
                <div class="card-name">${item.name}</div>
                <div class="card-dynasty">${item.dynasty} · ${item.type}</div>
                <div class="card-stat">
                    <span class="pattern-like-btn ${isLiked ? 'liked' : ''}" 
                          onclick="event.stopPropagation(); toggleLike('${pid}', this)">
                        ❤️${stats.like}
                    </span>
                    👁${stats.view} 💬${stats.comment.length}
                </div>
            </div>
        </div>`;
    });
    box.innerHTML = html;
}

document.querySelectorAll('.main-tab').forEach(tab => {
    tab.addEventListener('click', function () {
        document.querySelectorAll('.main-tab').forEach(t => t.classList.remove('active'));
        this.classList.add('active');
        nowCate = this.dataset.cate;
        renderPattern();
    });
});

document.getElementById('dynastyFilter').addEventListener('change', e => {
    nowDynasty = e.target.value;
    renderPattern();
});

document.getElementById('globalSearch').addEventListener('input', e => {
    searchVal = e.target.value.trim();
    renderPattern();
});

window.onload = renderPattern;
</script>
</body>
</html>
