<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>草稿箱</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft Yahei",sans-serif;}
        body{background:#f9f3eb;min-height:100vh;}
        .header{background:#965a20;color:white;padding:20px;border-radius:0 0 12px 12px;margin-bottom:30px;}
        .back-btn{background:white;color:#965a20;border:none;padding:7px 14px;border-radius:6px;cursor:pointer;margin-bottom:10px;}
        .container{max-width:1200px;margin:0 auto;padding:0 20px;}
        .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:20px;}
        .card{background:white;border-radius:10px;overflow:hidden;cursor:pointer;transition:0.2s;}
        .card:hover{transform:translateY(-4px);box-shadow:0 5px 12px rgba(0,0,0,0.08);}
        .card img{width:100%;height:180px;object-fit:cover;}
        .info{padding:12px;}
        .name{font-weight:bold;font-size:15px;}
        .empty{text-align:center;color:#999;padding:120px 20px;font-size:16px;display:none;}
    </style>
</head>
<body>
    <div class="header">
        <div class="container">
            <button class="back-btn" onclick="location.href='user.html'">← 返回个人中心</button>
            <h2>📁 草稿箱</h2>
        </div>
    </div>
    <div class="container">
        <div class="grid" id="draftGrid"></div>
        <p class="empty" id="emptyTip">暂无保存草稿~</p>
    </div>

<script>
const user = localStorage.getItem("loginUser");
if(!user){alert("请先登录");location.href="index.html";}

window.onload = renderDraft;
function renderDraft(){
    const drafts = JSON.parse(localStorage.getItem("FORUM_DRAFTS")) || [];
    const myDraft = drafts.filter(d => d.author === user);
    const grid = document.getElementById("draftGrid");
    const empty = document.getElementById("emptyTip");

    if(myDraft.length === 0){
        grid.style.display = "none";
        empty.style.display = "block";
        return;
    }
    grid.style.display = "grid";
    empty.style.display = "none";
    let html = "";
    myDraft.forEach(item=>{
        html += `
        <div class="card">
            <img src="${item.img}" alt="${item.name}">
            <div class="info"><div class="name">${item.name}</div></div>
        </div>`;
    })
    grid.innerHTML = html;
}
</script>
</body>
</html>
