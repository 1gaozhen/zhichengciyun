<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>陶瓷小课堂</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft Yahei";}
        body{background:#f9f3eb;padding-bottom:70px;}

        .header{
            background:#965a20;color:white;padding:18px 20px;
            display:flex;justify-content:space-between;align-items:center;
        }
        .header a{color:white;text-decoration:none;}

        .page-title{
            text-align:center;font-size:22px;padding:15px 0;
            color:#965a20;font-weight:bold;
            background:#fff;margin-bottom:10px;
        }

        /* 抖音式视频卡片 */
        .class-container{
            max-width:500px;margin:0 auto;padding:10px;
        }
        .video-card{
            background:#fff;border-radius:12px;margin-bottom:15px;
            overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.05);
        }
        .video-box{
            width:100%;height:280px;background:#000;
            position:relative;cursor:pointer;
        }
        .video-placeholder{
            width:100%;height:100%;object-fit:cover;
        }
        .video-info{padding:12px 15px;}
        .video-title{
            font-size:16px;font-weight:bold;margin-bottom:6px;
        }
        .video-desc{
            font-size:14px;color:#555;line-height:1.5;margin-bottom:10px;
        }

        /* 互动栏（点赞 浏览 评论）*/
        .action-bar{
            display:flex;gap:25px;padding:8px 0;
            font-size:14px;color:#666;
        }
        .action-item{
            display:flex;align-items:center;gap:6px;cursor:pointer;
        }
        .action-item.active{
            color:#ff4444;font-weight:bold;
        }

        /* 评论区 */
        .comment-section{
            padding:10px 15px;border-top:1px solid #f0f0f0;
        }
        .comment-input{
            width:100%;padding:8px 12px;border:1px solid #eee;
            border-radius:20px;font-size:14px;margin-bottom:10px;
        }
        .comment-item{
            padding:6px 0;font-size:13px;color:#444;
            border-bottom:1px solid #f8f8f8;
        }
        .comment-time{
            font-size:12px;color:#999;margin-left:6px;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-around;
            background: white;
            padding: 12px 0;
            box-shadow: 0 -2px 8px rgba(0,0,0,0.1);
        }
        .nav-item {
            text-align: center;
            font-size: 12px;
            color: #666;
            text-decoration: none;
        }
        .nav-item.active {
            color: #965a20;
            font-weight: bold;
        }
        .nav-icon {
            font-size: 20px;
            display: block;
            margin-bottom: 4px;
        }
    </style>
</head>

<body>

    <div class="header">
        <h2>陶瓷小课堂</h2>
        <a href="index.html">返回首页</a>
    </div>

    <div class="page-title">📚 传统陶瓷文化知识讲解</div>

    <div class="class-container" id="classList">
        <!-- 视频内容由JS渲染 -->
    </div>

    <!-- 底部导航 -->
    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
            <span class="nav-icon">🏠</span>
            <span>首页</span>
        </a>
        <a href="pattern.html" class="nav-item">
            <span class="nav-icon">📚</span>
            <span>纹样库</span>
        </a>
        <a href="forum.html" class="nav-item">
            <span class="nav-icon">💬</span>
            <span>论坛</span>
        </a>
        <a href="class.html" class="nav-item active">
            <span class="nav-icon">📖</span>
            <span>小课堂</span>
        </a>
    </nav>

<script>
// 全局存储键 统一对接首页热门课堂
const CLASS_VIDEOS_KEY = "CLASS_VIDEOS";
const CLASS_USER_LIKE_KEY = "CLASS_LIKE_";

// 初始课堂视频数据
let initClassData = [
    {
        id:1,
        title:"青花瓷的起源与发展",
        desc:"青花瓷始于唐代，在明清达到顶峰，是中国瓷器中最具代表性的品类。",
        cover:"images/class1.jpg",
        view:0,
        like:0,
        comment:[]
    },
    {
        id:2,
        title:"陶瓷纹样的文化寓意",
        desc:"龙纹象征权威、牡丹象征富贵、蝙蝠象征福气、鱼纹象征年年有余。",
        cover:"images/class2.jpg",
        view:0,
        like:0,
        comment:[]
    },
    {
        id:3,
        title:"传统陶瓷制作72道工序",
        desc:"从采土、揉泥、拉坯、利坯、施釉到烧制，每一步都是千年传承。",
        cover:"images/class3.jpg",
        view:0,
        like:0,
        comment:[]
    }
];

// 本地存储工具
function getLocal(key){
    return JSON.parse(localStorage.getItem(key)) || [];
}
function setLocal(key,data){
    localStorage.setItem(key,JSON.stringify(data));
}

// 初始化数据 不存在则存入
function initClassVideoData(){
    let localData = getLocal(CLASS_VIDEOS_KEY);
    if(localData.length === 0){
        setLocal(CLASS_VIDEOS_KEY,initClassData);
    }
}

// 点击视频封面增加浏览量
function addViewNum(vid){
    let videoList = getLocal(CLASS_VIDEOS_KEY);
    let idx = videoList.findIndex(item=>item.id === vid);
    if(idx !== -1){
        videoList[idx].view += 1;
        setLocal(CLASS_VIDEOS_KEY,videoList);
    }
    renderAll();
}

// 点赞功能
function toggleLike(id,el){
    const user = localStorage.getItem("loginUser");
    if(!user){alert("请先登录！");return;}
    let likeId = "C_"+id;
    let userLikeList = getLocal(CLASS_USER_LIKE_KEY + user);
    let videoList = getLocal(CLASS_VIDEOS_KEY);
    let vIdx = videoList.findIndex(v=>v.id === id);

    if(userLikeList.includes(likeId)){
        userLikeList = userLikeList.filter(item=>item !== likeId);
        videoList[vIdx].like = Math.max(0,videoList[vIdx].like - 1);
        el.classList.remove("active");
    }else{
        userLikeList.push(likeId);
        videoList[vIdx].like += 1;
        el.classList.add("active");
    }
    setLocal(CLASS_USER_LIKE_KEY+user,userLikeList);
    setLocal(CLASS_VIDEOS_KEY,videoList);
    renderAll();
}

// 渲染评论
function renderComments(list){
    if(!list||list.length===0)return "";
    let str = "";
    list.forEach(c=>{
        str+=`<div class="comment-item">${c.content} <span class="comment-time">${c.time}</span></div>`;
    });
    return str;
}

// 发送评论
function sendComment(id){
    const user = localStorage.getItem("loginUser");
    if(!user){alert("请先登录！");return;}
    let inp = document.getElementById("comment_"+id);
    let val = inp.value.trim();
    if(!val)return;

    let videoList = getLocal(CLASS_VIDEOS_KEY);
    let vIdx = videoList.findIndex(v=>v.id === id);
    videoList[vIdx].comment.unshift({
        user:user,
        content:val,
        time:new Date().toLocaleString()
    });
    setLocal(CLASS_VIDEOS_KEY,videoList);
    inp.value="";
    renderAll();
}

function focusComment(id){
    document.getElementById("comment_"+id).focus();
}

// 渲染全部课堂视频
function renderAll(){
    const box = document.getElementById("classList");
    const loginUser = localStorage.getItem("loginUser");
    let myLike = loginUser ? getLocal(CLASS_USER_LIKE_KEY+loginUser) : [];
    let videoList = getLocal(CLASS_VIDEOS_KEY);

    let html = "";
    videoList.forEach(item=>{
        let isLiked = myLike.includes("C_"+item.id);
        html+=`
        <div class="video-card">
            <div class="video-box" onclick="addViewNum(${item.id})">
                <img src="${item.cover}" class="video-placeholder" alt="视频封面">
            </div>
            <div class="video-info">
                <div class="video-title">${item.title}</div>
                <div class="video-desc">${item.desc}</div>
                <div class="action-bar">
                    <div class="action-item">👁 ${item.view}</div>
                    <div class="action-item ${isLiked?'active':''}" onclick="toggleLike(${item.id},this)">
                        ❤️ ${item.like}
                    </div>
                    <div class="action-item" onclick="focusComment(${item.id})">
                        💬 ${item.comment.length}
                    </div>
                </div>
            </div>

            <div class="comment-section">
                <input type="text" class="comment-input" id="comment_${item.id}" placeholder="说点什么...">
                <button onclick="sendComment(${item.id})">发送</button>
                <div id="commentList_${item.id}">
                    ${renderComments(item.comment)}
                </div>
            </div>
        </div>
        `;
    });
    box.innerHTML = html;
}

window.onload = function(){
    initClassVideoData();
    renderAll();
}
</script>
</body>
</html>
