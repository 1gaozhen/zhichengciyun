<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人中心</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Microsoft Yahei", sans-serif; }
        body { background-color: #f9f3eb; }
        .user-page {
            max-width: 360px;
            margin: 0 auto;
            background: #fff;
            min-height: 100vh;
            padding: 20px;
            position: relative;
        }
        .back-btn {
            display: inline-block;
            background: #965a20;
            color: white;
            padding: 6px 12px;
            border-radius: 4px;
            text-decoration: none;
            font-size: 14px;
            margin-bottom: 10px;
        }
        .welcome-text {
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .avatar-box {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            overflow: hidden;
            margin: 0 auto 10px;
            border: 3px solid #965a20;
            cursor: pointer;
        }
        .avatar-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .avatar-tip {
            text-align: center;
            font-size: 12px;
            color: #777;
            margin-bottom: 30px;
        }
        .menu-item {
            background: #f9f3eb;
            padding: 14px 16px;
            border-radius: 8px;
            margin-bottom: 10px;
            cursor: pointer;
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
        }
        .menu-item:hover {
            background: #f0e2ce;
        }
        .section-title {
            margin-top: 30px;
            margin-bottom: 15px;
            font-size: 18px;
            color: #965a20;
            font-weight: bold;
        }
        .content-area {
            margin-top: 20px;
            font-size: 14px;
            color: #777;
            text-align: center;
            padding: 20px 0;
        }
        .creation-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .creation-tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            border-radius: 6px;
            background: #f9f3eb;
            cursor: pointer;
            font-size: 16px;
            border: none;
        }
        .creation-tab.active {
            background: #965a20;
            color: white;
        }
        .creation-card {
            background: #f9f3eb;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 10px;
            display: flex;
            gap: 10px;
            align-items: center;
            text-align: left;
        }
        .creation-card img {
            width: 60px;
            height: 60px;
            border-radius: 4px;
            object-fit: cover;
        }
        .creation-info {
            flex: 1;
        }
        .creation-name {
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 4px;
        }
        .creation-time {
            font-size: 12px;
            color: #777;
        }
        .delete-btn {
            background: #ff4444;
            color: white;
            border: none;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
        }
        input#avatarUpload {
            display: none;
        }
        .clear-btn {
            background: #ff4444;
            color: #fff;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            border: none;
            cursor: pointer;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
<div class="user-page">
    <a href="index.html" class="back-btn">← 返回首页</a>

    <div class="welcome-text">欢迎：<span id="userName">用户</span></div>

    <div class="avatar-box" onclick="document.getElementById('avatarUpload').click()">
        <img id="avatarImg" src="images/ai-human.jpg" alt="头像">
    </div>
    <p class="avatar-tip">点击头像 → 从本地选取图片更换</p>
    <input type="file" id="avatarUpload" accept="image/*">

    <div class="menu-item" onclick="showSection('like')">❤️ 我的点赞记录</div>
    <div class="menu-item" onclick="showSection('collect')">⭐ 我的收藏</div>
    <div class="menu-item" onclick="showSection('history')">👁 浏览历史</div>
    <div class="menu-item" onclick="showSection('creation')">🌸 我的创作</div>
    <div class="menu-item" onclick="showSection('draft')">📁 草稿箱</div>
    <div class="menu-item" onclick="showSection('income')">💰 我的收益</div>

    <div class="section-title">个人中心</div>
    <div class="content-area" id="contentArea">请点击菜单查看内容</div>
</div>

<script>
const loginUser = localStorage.getItem("loginUser");
document.getElementById("userName").innerText = loginUser || "游客";

document.getElementById("avatarUpload").addEventListener("change", function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
        document.getElementById("avatarImg").src = e.target.result;
        localStorage.setItem(`avatar_${loginUser}`, e.target.result);
    };
    reader.readAsDataURL(file);
});

if (loginUser) {
    const saved = localStorage.getItem(`avatar_${loginUser}`);
    if (saved) document.getElementById("avatarImg").src = saved;
}

const patternData = [
    { name:"青花菊花纹", mainImg:"images/pattern_01_chrysanthemum.jpg", dynasty:"明代", type:"花卉纹样", desc:"高洁清雅、长寿安康。" },
    { name:"青花繁复缠枝花纹", mainImg:"images/pattern_02_complex.jpg", dynasty:"清代", type:"花卉纹样", desc:"层次丰富、生机盎然。" },
    { name:"青花龙纹纹样", mainImg:"images/pattern_03_dragon.jpg", dynasty:"明清通用", type:"瑞兽纹样", desc:"龙腾四海、运势昌盛。" },
    { name:"青花缠枝大花纹", mainImg:"images/pattern_04_flower.jpg", dynasty:"明代", type:"花卉纹样", desc:"花开繁盛、生生不息。" },
    { name:"青花福禄平安多子纹", mainImg:"images/pattern_05_fu.jpg", dynasty:"清代", type:"吉祥纹样", desc:"承载平安兴旺祈愿。" },
    { name:"青花葡萄纹", mainImg:"images/pattern_06_grape.jpg", dynasty:"明代", type:"果蔬纹样", desc:"多子多福、家业兴旺。" },
    { name:"青花缠枝牡丹纹", mainImg:"images/pattern_07_peony.jpg", dynasty:"明代", type:"花卉纹样", desc:"牡丹象征花开富贵、圆满昌盛。" },
    { name:"青花凤凰纹样", mainImg:"images/pattern_08_phoenix.jpg", dynasty:"明清通用", type:"瑞兽纹样", desc:"凤凰高贵吉祥。" },
    { name:"青花折枝小花纹", mainImg:"images/pattern_09_smallflower.jpg", dynasty:"明代", type:"花卉纹样", desc:"清雅秀气，东方审美。" },
    { name:"青花缠枝团花纹样", mainImg:"images/pattern_10_tuanhua.jpg", dynasty:"清代", type:"花卉纹样", desc:"圆形对称团花构图，寓意团圆美满。" },
    { name:"青花富贵平安纹", mainImg:"images/pattern_11_fupeace.jpg", dynasty:"清代", type:"吉祥纹样", desc:"富贵平安，万事如意。" },
    { name:"青花祥龙纳福纹", mainImg:"images/pattern_12_dragonluck.jpg", dynasty:"清代", type:"瑞兽纹样", desc:"祥龙纳福，驱邪避灾。" },
    { name:"青花吉语文字纹", mainImg:"images/pattern_13_character.jpg", dynasty:"清代", type:"文字纹样", desc:"吉语文字，吉祥祈福。" },
    { name:"青花瑞兽纹样", mainImg:"images/pattern_14_beast.jpg", dynasty:"明代", type:"瑞兽纹样", desc:"瑞兽护佑，家宅平安。" },
    { name:"青花寿桃吉祥纹", mainImg:"images/pattern_15_shouluck.jpg", dynasty:"清代", type:"吉祥纹样", desc:"寿桃寓意健康长寿。" },
    { name:"青花婴戏多子纹", mainImg:"images/pattern_16_childluck.jpg", dynasty:"明代", type:"吉祥纹样", desc:"婴戏多子，家族兴旺。" },
    { name:"青花团花纹样", mainImg:"images/pattern_17_circle.jpg", dynasty:"明代", type:"花卉纹样", desc:"团花对称，团圆美满。" }
];

function showSection(sec) {
    const area = document.getElementById("contentArea");
    if (!loginUser) { area.innerHTML = "请先登录！"; return; }
    switch(sec) {
        case "like": showLike(); break;
        case "collect": showCollect(); break;
        case "history": showHistory(); break;
        case "creation": showCreation(); break;
        case "draft": showDraft(); break;
        case "income": area.innerHTML = "我的收益功能开发中..."; break;
    }
}

function showLike() {
    const area = document.getElementById("contentArea");
    const list = JSON.parse(localStorage.getItem(`USER_LIKE_${loginUser}`))||[];
    if(!list.length){ area.innerHTML = "暂无点赞记录"; return; }
    let html = "";
    list.forEach(pid=>{
        const idx = parseInt(pid.replace("PAT_",""));
        const item = patternData[idx];
        if(!item)return;
        html+=`
        <div class="creation-card" onclick="location.href='detail.html?id=${idx}'">
            <img src="${item.mainImg}">
            <div class="creation-info">
                <div class="creation-name">${item.name}</div>
                <div class="creation-time">${item.dynasty} · ${item.type}</div>
            </div>
        </div>`;
    });
    area.innerHTML = html;
}

function showCollect() {
    const area = document.getElementById("contentArea");
    const list = JSON.parse(localStorage.getItem(`collect_${loginUser}`))||[];
    if(!list.length){ area.innerHTML = "暂无收藏记录"; return; }
    let html = "";
    list.forEach(item=>{
        const idx = item.pid.replace("PAT_","");
        html+=`
        <div class="creation-card" onclick="location.href='detail.html?id=${idx}'">
            <img src="${item.img}">
            <div class="creation-info">
                <div class="creation-name">${item.name}</div>
                <div class="creation-time">收藏时间：${item.collectTime}</div>
            </div>
        </div>`;
    });
    area.innerHTML = html;
}

function showHistory() {
    const area = document.getElementById("contentArea");
    const list = JSON.parse(localStorage.getItem(`history_${loginUser}`)) || [];
    if (!list || list.length === 0) {
        area.innerHTML = "暂无浏览记录";
        return;
    }
    let html = `<button class="clear-btn" onclick="clearHistory()">清空浏览历史</button>`;
    list.forEach(idx => {
        const item = patternData[idx];
        if (!item) return;
        html += `
        <div class="creation-card" onclick="location.href='detail.html?id=${idx}'">
            <img src="${item.mainImg}">
            <div class="creation-info">
                <div class="creation-name">${item.name}</div>
                <div class="creation-time">${item.dynasty} · ${item.type}</div>
            </div>
        </div>`;
    });
    area.innerHTML = html;
}

function clearHistory() {
    if (!confirm("确定要清空所有浏览历史吗？")) return;
    localStorage.setItem(`history_${loginUser}`, JSON.stringify([]));
    showHistory();
}

function showDraft() {
    const area = document.getElementById("contentArea");
    const drafts = JSON.parse(localStorage.getItem(`draft_${loginUser}`)) || [];
    if (drafts.length === 0) {
        area.innerHTML = "暂无草稿";
        return;
    }
    let html = "";
    drafts.forEach((item, index) => {
        html += `
        <div class="creation-card">
            <img src="${item.img || item.cover || 'images/default.png'}">
            <div class="creation-info">
                <div class="creation-name">${item.name || item.title || '未命名草稿'}</div>
                <div class="creation-time">${item.type === 'pattern' ? '纹样草稿' : '视频草稿'} · ${item.time}</div>
            </div>
            <button class="delete-btn" onclick="deleteDraft(${index})">删除</button>
        </div>`;
    });
    area.innerHTML = html;
}

function deleteDraft(index) {
    if (!confirm("确定删除此草稿？")) return;
    let drafts = JSON.parse(localStorage.getItem(`draft_${loginUser}`)) || [];
    drafts.splice(index, 1);
    localStorage.setItem(`draft_${loginUser}`, JSON.stringify(drafts));
    showDraft();
}

function showCreation() {
    const area = document.getElementById("contentArea");
    area.innerHTML = `
    <div class="creation-tabs">
        <button class="creation-tab active" onclick="switchTab('pattern', this)">纹样创作</button>
        <button class="creation-tab" onclick="switchTab('video', this)">视频创作</button>
    </div>
    <div id="creationContent">${renderPatternCreation()}</div>`;
}

function switchTab(type, el) {
    document.querySelectorAll(".creation-tab").forEach(t => t.classList.remove("active"));
    el.classList.add("active");
    document.getElementById("creationContent").innerHTML = type === "pattern" ? renderPatternCreation() : renderVideoCreation();
}

function renderPatternCreation() {
    const forumWorks = JSON.parse(localStorage.getItem("forumWorks")) || [];
    const myList = forumWorks.filter(item => item.author === loginUser);
    if (myList.length === 0) return `<div class="content-area">暂无纹样创作，快去论坛发布吧！</div>`;
    let html = "";
    myList.forEach((item, index) => {
        html += `
        <div class="creation-card">
            <img src="${item.img}">
            <div class="creation-info">
                <div class="creation-name">${item.name}</div>
                <div class="creation-time">论坛发布 · ${item.time}</div>
            </div>
            <button class="delete-btn" onclick="deleteForumWork(${index})">删除</button>
        </div>`;
    });
    return html;
}

function renderVideoCreation() {
    const classWorks = JSON.parse(localStorage.getItem("classWorks")) || [];
    const myList = classWorks.filter(item => item.author === loginUser);
    if (myList.length === 0) return `<div class="content-area">暂无视频创作，快去小课堂发布吧！</div>`;
    let html = "";
    myList.forEach((item, index) => {
        html += `
        <div class="creation-card">
            <img src="${item.cover}">
            <div class="creation-info">
                <div class="creation-name">${item.title}</div>
                <div class="creation-time">小课堂发布 · ${item.time}</div>
            </div>
            <button class="delete-btn" onclick="deleteClassWork(${index})">删除</button>
        </div>`;
    });
    return html;
}

function deleteForumWork(index) {
    if (!confirm("确定删除？论坛与个人中心同步删除！")) return;
    let forumWorks = JSON.parse(localStorage.getItem("forumWorks")) || [];
    let myWorks = forumWorks.filter(f => f.author === loginUser);
    let realIdx = forumWorks.findIndex(f => f === myWorks[index]);
    if (realIdx > -1) forumWorks.splice(realIdx, 1);
    localStorage.setItem("forumWorks", JSON.stringify(forumWorks));
    showCreation();
}

function deleteClassWork(index) {
    if (!confirm("确定删除？小课堂与个人中心同步删除！")) return;
    let classWorks = JSON.parse(localStorage.getItem("classWorks")) || [];
    let myWorks = classWorks.filter(f => f.author === loginUser);
    let realIdx = classWorks.findIndex(f => f === myWorks[index]);
    if (realIdx > -1) classWorks.splice(realIdx, 1);
    localStorage.setItem("classWorks", JSON.stringify(classWorks));
    showCreation();
}
</script>
</body>
</html>
