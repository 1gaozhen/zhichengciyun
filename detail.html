<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>纹样详情</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft Yahei";}
        body{background:#f9f3eb;max-width:1000px;margin:0 auto;padding:20px;}
        .top-title{background:#965a20;color:white;text-align:center;padding:20px;border-radius:8px;font-size:28px;margin-bottom:20px;}
        .main-img{width:100%;max-height:600px;object-fit:contain;background:white;border-radius:10px;margin:20px 0;}
        .info-card{background:white;padding:20px;border-radius:10px;margin-bottom:20px;}
        .info-card h2{margin-bottom:10px;color:#333;}
        .dynasty{color:#965a20;font-weight:bold;margin:8px 0;}
        .desc{line-height:1.8;color:#444;margin:15px 0;}
        .stat-bar{display:flex;gap:30px;margin:15px 0;font-size:18px;align-items:center;}
        
        .like-btn{
            cursor:pointer;
            padding:8px 16px;
            border-radius:20px;
            display:flex;align-items:center;gap:5px;
            border:1px solid #ddd;background:white;color:#666;
            transition: all 0.2s;
        }
        .like-btn.liked{
            background:#ff4444;color:white;border-color:#ff4444;
        }
        .like-btn:active {
            transform: scale(0.92);
        }

        .section-title{font-size:20px;margin:30px 0 15px;border-left:4px solid #965a20;padding-left:10px;color:#333;}
        .comment-input-area{display:flex;gap:10px;margin:15px 0;}
        #commentInput{flex:1;padding:10px;border:1px solid #ddd;border-radius:6px;}
        #submitComment{background:#965a20;color:white;border:none;padding:10px 20px;border-radius:6px;cursor:pointer;}
        
        .comment-item{
            background:#f3e9da;padding:12px;border-radius:6px;margin-bottom:10px;
            display:flex;justify-content:space-between;align-items:center;
        }
        .comment-item span{font-size:12px;color:#777;}
        .del-btn{
            background:#ff4444;color:white;border:none;padding:4px 8px;border-radius:4px;
            font-size:12px;cursor:pointer;
        }
        .back-list{display:block;width:fit-content;margin:40px auto;background:#965a20;color:white;padding:10px 30px;border-radius:20px;text-decoration:none;color:white;}
    </style>
</head>
<body>
    <div class="top-title">纹样详情介绍</div>
    <img class="main-img" id="dMainImg" alt="纹样大图">

    <div class="info-card">
        <h2 id="dName"></h2>
        <p class="dynasty" id="dDynasty"></p>
        <p class="desc" id="dDesc"></p>
        <div class="stat-bar">
            <div class="like-btn" id="likeBtn">❤️ <span id="likeCount">0</span></div>
            <div>👁 浏览量：<span id="viewCount">0</span></div>
        </div>
    </div>

    <h3 class="section-title">用户留言区</h3>
    <div class="comment-input-area">
        <input type="text" id="commentInput" placeholder="分享你对这款纹样的看法...">
        <button id="submitComment">提交留言</button>
    </div>
    <div id="commentList"></div>

    <a href="pattern.html" class="back-list">← 返回纹样库</a>

<script>
// ==========================
// 17个完整统一纹样数据
// ==========================
const patternData = [
    { name:"青花菊花纹", mainImg:"images/pattern_01_chrysanthemum.jpg", dynasty:"明代", type:"花卉纹样", desc:"高洁清雅、长寿安康。" },
    { name:"青花繁复缠枝花纹", mainImg:"images/pattern_02_complex.jpg", dynasty:"清代", type:"花卉纹样", desc:"层次丰富、生机盎然。" },
    { name:"青花龙纹纹样", mainImg:"images/pattern_03_dragon.jpg", dynasty:"明清通用", type:"瑞兽纹样", desc:"龙腾四海、运势昌盛。" },
    { name:"青花缠枝大花纹", mainImg:"images/pattern_04_flower.jpg", dynasty:"明代", type:"花卉纹样", desc:"花开繁盛、生生不息。" },
    { name:"青花福禄平安多子纹", mainImg:"images/pattern_05_fu.jpg", dynasty:"清代", type:"吉祥纹样", desc:"承载平安兴旺祈愿。" },
    { name:"青花葡萄纹", mainImg:"images/pattern_06_grape.jpg", dynasty:"明代", type:"果蔬纹样", desc:"多子多福、家业兴旺。" },
    { name:"青花缠枝牡丹纹", mainImg:"images/pattern_07_peony.jpg", dynasty:"明代", type:"花卉纹样", desc:"牡丹象征花开富贵、圆满昌盛。" },
    { name:"青花凤凰纹样", mainImg:"images/pattern_08_phoenix.jpg", dynasty:"明清通用", type:"瑞兽纹样", desc:"凤凰高贵吉祥。" },
    { name:"青花折枝小花纹", mainImg:"images/pattern_09_smallflower.jpg", dynasty:"明代", type:"花卉纹样", desc:"清雅秀气，东方审美。" },
    { name:"青花缠枝团花纹样", mainImg:"images/pattern_10_tuanhua.jpg", dynasty:"清代", type:"花卉纹样", desc:"圆形对称团花构图，寓意团圆美满。" },
    { name:"青花富贵平安纹", mainImg:"images/pattern_11_fupeace.jpg", dynasty:"清代", type:"吉祥纹样", desc:"富贵平安，万事如意。" },
    { name:"青花祥龙纳福纹", mainImg:"images/pattern_12_dragonluck.jpg", dynasty:"清代", type:"瑞兽纹样", desc:"祥龙纳福，驱邪避灾。" },
    { name:"青花吉语文字纹", mainImg:"images/pattern_13_character.jpg", dynasty:"清代", type:"文字纹样", desc:"吉语文字，吉祥祈福。" },
    { name:"青花瑞兽纹样", mainImg:"images/pattern_14_beast.jpg", dynasty:"明代", type:"瑞兽纹样", desc:"瑞兽护佑，家宅平安。" },
    { name:"青花寿桃吉祥纹", mainImg:"images/pattern_15_shouluck.jpg", dynasty:"清代", type:"吉祥纹样", desc:"寿桃寓意健康长寿。" },
    { name:"青花婴戏多子纹", mainImg:"images/pattern_16_childluck.jpg", dynasty:"明代", type:"吉祥纹样", desc:"婴戏多子，家族兴旺。" },
    { name:"青花团花纹样", mainImg:"images/pattern_17_circle.jpg", dynasty:"明代", type:"花卉纹样", desc:"团花对称，团圆美满。" }
];

// ==========================
// 统计方法
// ==========================
function getPatternStats(idx) {
    return {
        like: parseInt(localStorage.getItem("like_" + idx)) || 0,
        view: parseInt(localStorage.getItem("view_" + idx)) || 0,
        comment: JSON.parse(localStorage.getItem("comment_" + idx)) || []
    };
}

// ==========================
// 页面初始化
// ==========================
const urlParams = new URLSearchParams(window.location.search);
const patternId = urlParams.get('id');
if (!patternId || !patternData[patternId]) location.href = "pattern.html";

const data = patternData[patternId];
let stats = getPatternStats(patternId);
const currentPid = "PAT_" + patternId;
const loginUser = localStorage.getItem("loginUser");

// 浏览量+1
stats.view++;
localStorage.setItem(`view_${patternId}`, stats.view);

// ==========================
// ✅ 自动保存浏览历史（已集成）
// ==========================
function saveHistory(id) {
    const user = localStorage.getItem("loginUser");
    if (!user) return;
    let history = JSON.parse(localStorage.getItem(`history_${user}`)) || [];
    history = history.filter(item => item !== id);
    history.unshift(id);
    if (history.length > 50) history = history.slice(0, 50);
    localStorage.setItem(`history_${user}`, JSON.stringify(history));
}
saveHistory(patternId);

document.getElementById('dName').innerText = data.name;
document.getElementById('dDynasty').innerText = `朝代：${data.dynasty} | 类型：${data.type}`;
document.getElementById('dDesc').innerText = data.desc;
document.getElementById('dMainImg').src = data.mainImg;
document.getElementById('likeCount').innerText = stats.like;
document.getElementById('viewCount').innerText = stats.view;

// ==========================
// 点赞（三端同步）
// ==========================
const likeBtn = document.getElementById('likeBtn');
if (loginUser) {
    let likeList = JSON.parse(localStorage.getItem(`USER_LIKE_${loginUser}`)) || [];
    if (likeList.includes(currentPid)) {
        likeBtn.classList.add('liked');
    }
}

likeBtn.onclick = function () {
    if (!loginUser) {
        alert("请先登录！");
        return;
    }
    let likeList = JSON.parse(localStorage.getItem(`USER_LIKE_${loginUser}`)) || [];
    if (this.classList.contains('liked')) {
        this.classList.remove('liked');
        stats.like = Math.max(0, stats.like - 1);
        likeList = likeList.filter(id => id !== currentPid);
    } else {
        this.classList.add('liked');
        stats.like++;
        likeList.push(currentPid);
    }
    localStorage.setItem(`USER_LIKE_${loginUser}`, JSON.stringify(likeList));
    localStorage.setItem(`like_${patternId}`, stats.like);
    document.getElementById('likeCount').innerText = stats.like;
};

// ==========================
// 留言功能
// ==========================
function renderComment() {
    const commentBox = document.getElementById('commentList');
    commentBox.innerHTML = '';
    stats.comment.forEach((msg, index) => {
        let div = document.createElement('div');
        div.className = "comment-item";
        div.innerHTML = `
            <div>
                <span>${msg.time}</span>
                <p>${msg.content}</p>
            </div>
            <button class="del-btn" onclick="deleteComment(${index})">删除</button>
        `;
        commentBox.appendChild(div);
    });
}

function deleteComment(index) {
    if (!confirm("确定要删除这条留言吗？")) return;
    stats.comment.splice(index, 1);
    localStorage.setItem(`comment_${patternId}`, JSON.stringify(stats.comment));
    renderComment();
}

document.getElementById('submitComment').onclick = function () {
    let input = document.getElementById('commentInput');
    let val = input.value.trim();
    if (!val) { alert("请输入留言内容"); return; }
    stats.comment.unshift({
        content: val,
        time: new Date().toLocaleString()
    });
    localStorage.setItem(`comment_${patternId}`, JSON.stringify(stats.comment));
    input.value = '';
    renderComment();
}

renderComment();
</script>
</body>
</html>
